name: CI/CD — MS Operação FGO

# =================================================================
# FLUXO COMPLETO (a cada push na main):
#
#   1. Testes unitários  → relatório visual no Actions
#   2. Compilar JAR
#   3. Build imagem com Podman (runner no servidor RHEL)
#   4. Push para registry interno do OpenShift (localhost)
#   5. Rolling update (zero downtime)
#   6. Smoke test no /q/health
#   7. Resumo visual no GitHub Actions Summary
#
# SECRETS NECESSÁRIOS (Settings → Secrets → Actions):
#   OPENSHIFT_TOKEN = token da SA github-deployer (gerado pelo bootstrap)
#
# Runner: self-hosted no servidor RHEL (não depende do Mac estar ligado)
# =================================================================

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Pular testes (só em emergência)'
        type: boolean
        default: false

permissions:
  checks: write
  contents: read

jobs:

  # ---------------------------------------------------------------
  # JOB 1 — Testes Unitários
  # Roda sempre, bloqueia o deploy se falhar
  # ---------------------------------------------------------------
  testes:
    name: Testes Unitários
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Rodar testes
        if: ${{ !inputs.skip_tests }}
        run: mvn test --no-transfer-progress

      - name: Publicar relatório de testes no Actions
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados dos Testes
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Resumo dos testes
        if: always()
        run: |
          echo "## Testes Unitários" >> $GITHUB_STEP_SUMMARY
          if [ -d target/surefire-reports ] && ls target/surefire-reports/*.xml 2>/dev/null | head -1 | grep -q xml; then
            TOTAL=$(grep -roh 'tests="[0-9]*"' target/surefire-reports/*.xml | grep -oh '[0-9]*' | awk '{s+=$1} END {print s+0}')
            FALHAS=$(grep -roh 'failures="[0-9]*"' target/surefire-reports/*.xml | grep -oh '[0-9]*' | awk '{s+=$1} END {print s+0}')
            ERROS=$(grep -roh 'errors="[0-9]*"' target/surefire-reports/*.xml | grep -oh '[0-9]*' | awk '{s+=$1} END {print s+0}')
            IGNORADOS=$(grep -roh 'skipped="[0-9]*"' target/surefire-reports/*.xml | grep -oh '[0-9]*' | awk '{s+=$1} END {print s+0}')
            echo "| Resultado | Quantidade |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|------------|" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passaram | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Falhas   | $FALHAS |" >> $GITHUB_STEP_SUMMARY
            echo "| 💥 Erros    | $ERROS |" >> $GITHUB_STEP_SUMMARY
            echo "| ⏭️ Ignorados| $IGNORADOS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "> ⚠️ Nenhum teste encontrado em \`src/test/\`" >> $GITHUB_STEP_SUMMARY
          fi

  # ---------------------------------------------------------------
  # JOB 2 — Build e Deploy
  # Só roda se testes passarem
  # ---------------------------------------------------------------
  deploy:
    name: Build → Registry → Deploy
    runs-on: self-hosted
    needs: testes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar JAR
        run: |
          mvn package -DskipTests --no-transfer-progress -q
          echo "## Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 🌿 Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ JAR compilado" >> $GITHUB_STEP_SUMMARY

      - name: Login no OpenShift
        run: |
          # Runner está no servidor — acessa o CRC diretamente via localhost
          oc login \
            --server=https://localhost:6443 \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --insecure-skip-tls-verify=true
          echo "- ✅ Login OpenShift: $(oc whoami)" >> $GITHUB_STEP_SUMMARY

      - name: Build da imagem com Podman
        run: |
          # Servidor usa Podman (RHEL) — mesma CLI do Docker
          podman build \
            -t ms-operacao:${{ github.sha }} \
            -t ms-operacao:latest \
            .
          echo "- ✅ Imagem construída: \`ms-operacao:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Push para registry interno do OpenShift
        run: |
          REGISTRY=default-route-openshift-image-registry.apps-crc.testing
          TOKEN=$(oc whoami -t)
          podman login \
            --tls-verify=false \
            --username kubeadmin \
            --password "$TOKEN" \
            $REGISTRY

          podman tag ms-operacao:${{ github.sha }} $REGISTRY/fgo-backend/ms-operacao:${{ github.sha }}
          podman tag ms-operacao:${{ github.sha }} $REGISTRY/fgo-backend/ms-operacao:latest

          podman push --tls-verify=false $REGISTRY/fgo-backend/ms-operacao:${{ github.sha }}
          podman push --tls-verify=false $REGISTRY/fgo-backend/ms-operacao:latest
          echo "- ✅ Push concluído: \`$REGISTRY/fgo-backend/ms-operacao:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Aplicar manifestos
        run: |
          oc apply -f openshift/01-namespace.yaml
          oc apply -f openshift/03-configmap.yaml
          oc apply -f openshift/05-service.yaml
          oc apply -f openshift/06-route.yaml
          echo "- ✅ Manifestos aplicados" >> $GITHUB_STEP_SUMMARY

      - name: Rolling update — nova versão
        run: |
          IMAGE="image-registry.openshift-image-registry.svc:5000/fgo-backend/ms-operacao:${{ github.sha }}"
          oc set image deployment/ms-operacao ms-operacao=$IMAGE -n fgo-backend
          echo "- 🚀 Rolling update iniciado: \`$IMAGE\`" >> $GITHUB_STEP_SUMMARY
          echo "- ℹ️ Pod antigo só morre quando o novo estiver healthy (zero downtime)" >> $GITHUB_STEP_SUMMARY

      - name: Aguardar rollout completo
        run: |
          oc rollout status deployment/ms-operacao -n fgo-backend --timeout=900s
          echo "- ✅ Rollout concluído" >> $GITHUB_STEP_SUMMARY

      - name: Smoke test — /q/health/live
        run: |
          # Pega o pod do novo deployment (o mais recentemente criado)
          POD=$(oc get pods -n fgo-backend -l app=ms-operacao \
            --no-headers -o custom-columns=':metadata.name,:metadata.creationTimestamp' \
            | sort -k2 -r | head -1 | awk '{print $1}')
          echo "Testando pod: $POD"

          # Testa /q/health/live (liveness) — responde UP assim que o app sobe,
          # independente do warm-up do Redis estar completo.
          STATUS="ERRO"
          for i in $(seq 1 18); do
            HEALTH=$(oc exec -n fgo-backend $POD -- \
              wget -qO- http://localhost:8080/q/health/live 2>/dev/null || true)
            STATUS=$(echo "$HEALTH" | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])" 2>/dev/null || echo "AGUARDANDO")
            echo "Tentativa $i/18 — status: $STATUS"
            if [ "$STATUS" = "UP" ]; then
              break
            fi
            sleep 10
          done

          if [ "$STATUS" != "UP" ]; then
            echo "❌ Health check FALHOU após 3 minutos — status: $STATUS"
            exit 1
          fi

          echo "## Smoke Test" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ /q/health/ready: **UP**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          echo "$HEALTH" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Status final
        if: always()
        run: |
          echo "## Pods — fgo-backend" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          oc get pods -n fgo-backend 2>&1 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ROTA=$(oc get route ms-operacao -n fgo-backend -o jsonpath='{.spec.host}' 2>/dev/null || echo "não encontrada")
          echo "## Rota" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 https://$ROTA" >> $GITHUB_STEP_SUMMARY
