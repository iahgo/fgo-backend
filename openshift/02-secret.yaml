# =============================================================================
# SEGREDOS DO MS OPERAÇÃO
# =============================================================================
# NÃO commite este arquivo com valores reais.
# Os valores reais são aplicados pelo CI/CD via GitHub Secrets.
#
# DB2 roda via Podman no host (bare metal RHEL).
# Acessível pelo IP da bridge libvirt: 192.168.122.1 (virbr0)
# Este IP é estável — não muda com reinicializações.
#
# Redis Sentinel: usar scheme redis:// (NÃO redis-sentinel://)
# A detecção de modo Sentinel é feita via quarkus.redis.client-type=SENTINEL
# no application.properties.
#
# Para aplicar manualmente:
#   oc create secret generic ms-operacao-secrets \
#     --from-literal=DB2_HOST=192.168.122.1 \
#     --from-literal=DB2_PORT=50000 \
#     --from-literal=DB2_DATABASE=DCG1 \
#     --from-literal=DB2_USER=Db2inst1 \
#     --from-literal=DB2_PASSWORD=SENHA \
#     --from-literal=REDIS_SENTINEL_HOSTS=redis://redis-sentinel-0...:26379,... \
#     --from-literal=REDIS_MASTER_NAME=mymaster \
#     --from-literal=REDIS_PASSWORD=SENHA \
#     -n fgo-backend
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ms-operacao-secrets
  namespace: fgo-backend
  labels:
    app.kubernetes.io/name: ms-operacao
    app.kubernetes.io/part-of: fgo
type: Opaque
stringData:
  DB2_HOST: "192.168.122.1"
  DB2_PORT: "50000"
  DB2_DATABASE: "DCG1"
  DB2_USER: "Db2inst1"
  DB2_PASSWORD: "TROCAR_NAO_COMMITAR"
  REDIS_SENTINEL_HOSTS: "redis://redis-sentinel-0.redis-sentinel.fgo-redis.svc.cluster.local:26379,redis://redis-sentinel-1.redis-sentinel.fgo-redis.svc.cluster.local:26379,redis://redis-sentinel-2.redis-sentinel.fgo-redis.svc.cluster.local:26379"
  REDIS_MASTER_NAME: "mymaster"
  REDIS_PASSWORD: "TROCAR_NAO_COMMITAR"
