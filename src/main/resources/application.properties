# =================================================================
# MS Operação FGO — Configuração
# =================================================================
# Todos os valores sensíveis vêm de variáveis de ambiente.
#
# Em desenvolvimento local:
#   Copie .env.example para .env e preencha os valores.
#   O Quarkus lê o .env automaticamente em dev mode — não precisa de export.
#   mvn quarkus:dev
#
# Em produção (OpenShift):
#   Os valores vêm do Secret ms-operacao-secrets criado pelo bootstrap.sh.
#   Os pods leem via envFrom — nenhuma credencial no código ou no CI/CD.
# =================================================================

# -----------------------------------------------------------------
# DB2 — Dev Services desabilitado (não há imagem gratuita de Dev Services para IBM DB2)
# Credenciais vêm do .env em dev, do Secret ms-operacao-secrets em produção
# -----------------------------------------------------------------
quarkus.datasource.devservices.enabled=false
quarkus.datasource.db-kind=db2
quarkus.datasource.jdbc.url=jdbc:db2://${DB2_HOST}:${DB2_PORT:50000}/${DB2_DATABASE}
quarkus.datasource.username=${DB2_USER}
quarkus.datasource.password=${DB2_PASSWORD}
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=10

# -----------------------------------------------------------------
# Redis — DEV (perfil %dev)
#
# Dev Services sobe um Redis simples via Docker automaticamente.
# Não precisa de .env para Redis em dev — o Quarkus resolve.
# -----------------------------------------------------------------
%dev.quarkus.redis.devservices.enabled=false
%dev.quarkus.redis.hosts=redis://100.122.139.76:6379
%dev.quarkus.redis.password=FgoRedis@2026
%dev.quarkus.redis.timeout=5s
%dev.quarkus.redis.max-pool-size=10

# -----------------------------------------------------------------
# Redis — PRODUÇÃO (perfil %prod)
#
# Usa Redis Sentinel. Endereços dos SENTINELS (não do master).
# O Sentinel avisa o cliente quando o master muda no failover.
# O Quarkus se reconecta automaticamente ao novo master sem restart.
#
# REDIS_SENTINEL_HOSTS (OpenShift):
#   redis://redis-sentinel-0.redis-sentinel.fgo-redis.svc.cluster.local:26379,...
# -----------------------------------------------------------------
%prod.quarkus.redis.devservices.enabled=false
# Sentinel mode: client-type=SENTINEL + redis:// URIs apontando para as portas dos sentinels
# O Vert.x Redis descobre o master via protocolo Sentinel automaticamente
%prod.quarkus.redis.client-type=SENTINEL
%prod.quarkus.redis.master-name=${REDIS_MASTER_NAME:mymaster}
%prod.quarkus.redis.hosts=${REDIS_SENTINEL_HOSTS}
%prod.quarkus.redis.password=${REDIS_PASSWORD}
%prod.quarkus.redis.timeout=5s
%prod.quarkus.redis.max-pool-size=10

# -----------------------------------------------------------------
# Cache — TTL e lock distribuído
# PT25H = 25 horas (garante dados no Redis mesmo se o scheduler falhar)
# PT5M  = 5 minutos (auto-liberação do lock em caso de crash do pod)
# -----------------------------------------------------------------
fgo.cache.ttl-dados=PT25H
fgo.cache.ttl-lock=PT5M

# -----------------------------------------------------------------
# JTA Transaction Timeout
# A query de agregação em 100M+ linhas pode demorar vários minutos.
# O padrão (60s) mata a transação antes de terminar — aumentamos para 10min.
# -----------------------------------------------------------------
quarkus.transaction-manager.default-transaction-timeout=600

# -----------------------------------------------------------------
# Jackson — datas como string ISO-8601
# -----------------------------------------------------------------
quarkus.jackson.write-dates-as-timestamps=false

# -----------------------------------------------------------------
# OpenAPI / Swagger UI
# Swagger acessível externamente via rota OpenShift:
#   https://<ROUTE_HOST>/q/swagger-ui
# Para descobrir a URL: oc get route ms-operacao -n fgo-backend
# -----------------------------------------------------------------
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.swagger-ui.theme=flattop

mp.openapi.extensions.smallrye.info.title=MS Painel FGO
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=\
**Microserviço de KPIs de Operações de Crédito — Fundo de Garantia de Operações (FGO)**\n\
\n\
## Ambiente de demonstração\n\
- **DB2:** ~100M registros em OPR\\_CRD\\_FNDO\\_GRTR (35 GB), 40 agentes financeiros\n\
- **Redis Sentinel:** 1 master + 2 réplicas + 3 sentinels — TTL 25h por agente/mês\n\
- **Pod:** Quarkus 3.8.4 / JVM 17 rodando em OpenShift Local (CRC) no RHEL 9\n\
\n\
## Fluxo de dados\n\
`DB2 → warm-up diário (07:20) → Redis → API < 1ms`\n\
\n\
## ⚠️ Endpoints destrutivos\n\
Os endpoints do grupo **Admin — Seed de Dados** operam sobre o banco real.\n\
Leia a descrição antes de executar. Se executar, irá apagar os dados e gravar novamente.\n\
\n\
## Links\n\
- [Health](./q/health) · [Métricas do Sistema](./admin/sistema) · [Logs do Pod](./admin/logs)

# Servidor padrão (dev local)
%dev.mp.openapi.extensions.smallrye.servers[0].url=http://localhost:8080
%dev.mp.openapi.extensions.smallrye.servers[0].description=Dev local

# Servidor de produção (URL do OpenShift — atualizar com a rota real)
%prod.mp.openapi.extensions.smallrye.servers[0].url=${APP_URL:https://ms-operacao-fgo-backend.apps-crc.testing}
%prod.mp.openapi.extensions.smallrye.servers[0].description=OpenShift (produção)

# -----------------------------------------------------------------
# Health checks
# -----------------------------------------------------------------
quarkus.smallrye-health.root-path=/q/health

# -----------------------------------------------------------------
# Logging
# -----------------------------------------------------------------
quarkus.log.level=INFO
quarkus.log.category."com.example".level=DEBUG

# -----------------------------------------------------------------
# DEV — H2 in-memory (substitui DB2 em desenvolvimento)
# Cria schemas DB2D4W e DB2GFG para compatibilidade com as queries nativas
# -----------------------------------------------------------------
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:fgodb;DB_CLOSE_DELAY=-1;CASE_INSENSITIVE_IDENTIFIERS=TRUE;INIT=RUNSCRIPT FROM 'classpath:db/h2-init.sql'
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=
%dev.quarkus.datasource.devservices.enabled=false

# -----------------------------------------------------------------
# DEV — Segurança JWT desabilitada para testes via Swagger
# Em dev: passe X-Cod-Agente no header para simular agente (default=1)
# -----------------------------------------------------------------
%dev.fgo.auth.habilitado=false
%dev.fgo.auth.validar-assinatura=false
%dev.fgo.auth.segredo-autorizacao=fgo-dev-secret-change-in-prod

# Produção — JWT obrigatório
%prod.fgo.auth.habilitado=true
%prod.fgo.auth.validar-assinatura=true
%prod.fgo.auth.segredo-autorizacao=${FGO_JWT_SECRET}

# -----------------------------------------------------------------
# Health query — SELECT 1 em dev (H2), SELECT 1 FROM SYSIBM.SYSDUMMY1 em prod (DB2)
# -----------------------------------------------------------------
%dev.fgo.db.health-query=SELECT 1
%prod.fgo.db.health-query=SELECT 1 FROM SYSIBM.SYSDUMMY1
