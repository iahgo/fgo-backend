# =================================================================
# MS Operação FGO — Configuração
# =================================================================
# Todos os valores sensíveis vêm de variáveis de ambiente.
#
# Em desenvolvimento local:
#   Copie .env.example para .env e preencha os valores.
#   O Quarkus lê o .env automaticamente em dev mode — não precisa de export.
#   mvn quarkus:dev
#
# Em produção (OpenShift):
#   Os valores vêm do Secret ms-operacao-secrets criado pelo bootstrap.sh.
#   Os pods leem via envFrom — nenhuma credencial no código ou no CI/CD.
# =================================================================

# -----------------------------------------------------------------
# DB2
# -----------------------------------------------------------------
quarkus.datasource.db-kind=db2
quarkus.datasource.jdbc.url=jdbc:db2://${DB2_HOST}:${DB2_PORT:50000}/${DB2_DATABASE}
quarkus.datasource.username=${DB2_USER}
quarkus.datasource.password=${DB2_PASSWORD}
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=10

# -----------------------------------------------------------------
# Redis Sentinel
#
# Os endereços aqui são dos SENTINELS — não do master.
# O Sentinel é quem conhece o master atual e avisa o cliente
# quando o master muda (failover). O Quarkus se reconecta
# automaticamente ao novo master sem restart de pod.
#
# REDIS_SENTINEL_HOSTS em produção: DNS interno do OpenShift
#   redis://redis-sentinel-0.redis-sentinel.fgo-redis.svc.cluster.local:26379,...
# REDIS_SENTINEL_HOSTS em dev local: IP Tailscale da VM com as portas dos sentinels
#   redis://100.64.0.X:26379,redis://100.64.0.X:26380,redis://100.64.0.X:26381
# -----------------------------------------------------------------
quarkus.redis.sentinel.master=mymaster
quarkus.redis.sentinel.hosts=${REDIS_SENTINEL_HOSTS}
quarkus.redis.password=${REDIS_PASSWORD}
quarkus.redis.timeout=5s
quarkus.redis.max-pool-size=10

# -----------------------------------------------------------------
# Cache — TTL e lock distribuído
# PT25H = 25 horas (garante dados no Redis mesmo se o scheduler falhar)
# PT5M  = 5 minutos (auto-liberação do lock em caso de crash do pod)
# -----------------------------------------------------------------
fgo.cache.ttl-dados=PT25H
fgo.cache.ttl-lock=PT5M

# -----------------------------------------------------------------
# Jackson — datas como string ISO-8601
# -----------------------------------------------------------------
quarkus.jackson.write-dates-as-timestamps=false

# -----------------------------------------------------------------
# OpenAPI / Swagger UI
# -----------------------------------------------------------------
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
mp.openapi.extensions.smallrye.info.title=MS Operação FGO
mp.openapi.extensions.smallrye.info.version=1.0.0

# -----------------------------------------------------------------
# Health checks
# -----------------------------------------------------------------
quarkus.smallrye-health.root-path=/q/health

# -----------------------------------------------------------------
# Logging
# -----------------------------------------------------------------
quarkus.log.level=INFO
quarkus.log.category."com.example".level=DEBUG
